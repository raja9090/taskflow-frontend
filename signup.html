<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - TaskFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="auth-box">
    <div class="left-panel">
      <h1>Create Account</h1>
      <p>Start organizing your workflow like a pro.</p>
    </div>
    <div class="right-panel">
      <h2 class="form-title">Join TaskFlow</h2>
      <form onsubmit="redirectToWelcome(event)">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter full name" required>
        </div>
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Create password" required minlength="8">
          <small style="color:#64748b; display:block; margin-top:8px;">Strong password required for better security.</small>
        </div>
        <button class="btn">Sign Up</button>
      </form>

      <div class="social-login">
        <button class="social-btn google-btn">Sign up with Google</button>
</html>
